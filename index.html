<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Test Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: white;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: white;
        }

        button:hover {
            background-color: #ddd;
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Test Website</h1>
    <p>Click the button to test JavaScript.</p>
    
    <button onclick="showMessage()">Click Me</button>
    
    <div id="message"></div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML = "🎉 JavaScript is working!";
        }
    </script>

</body>
</html>
